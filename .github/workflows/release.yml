name: Chilli Multi-Platform Release (Rust)

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Build Chilli for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: target/release/chilli
            asset: chilli.deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output: target/release/chilli.exe
            asset: chilli.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            output: target/release/chilli
            asset: chilli.pkg

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      # Linux: Wrap in .deb
      - if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p deb-root/usr/local/bin
          cp target/${{ matrix.target }}/release/chilli deb-root/usr/local/bin/chilli
          mkdir -p deb-root/DEBIAN
          echo -e "Package: chilli\nVersion: 1.0.0\nArchitecture: amd64\nMaintainer: john\nDescription: Chilli App" > deb-root/DEBIAN/control
          dpkg-deb --build deb-root chilli.deb

      # Mac: Wrap in .pkg
      - if: matrix.os == 'macos-latest'
        run: |
          # Ensure binary is in a clean root for pkgbuild
          mkdir -p bin-root/usr/local/bin
          cp target/${{ matrix.target }}/release/chilli bin-root/usr/local/bin/chilli
          pkgbuild --identifier com.chilli.app --install-location / --root bin-root chilli.pkg

      # Windows: Just rename for the asset step if needed
      - if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/chilli.exe ./chilli.exe
        shell: bash

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to AtomGit
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Replace OWNER/REPO with your actual GitCode path
          curl -X POST -H "Authorization: token ${{ secrets.ATOMGIT_TOKEN }}" \
               -F "file=@${{ matrix.asset }}" \
               "https://api.gitcode.com/v5/repos/YOUR_ORG/YOUR_REPO/releases/tags/$TAG_NAME/assets"